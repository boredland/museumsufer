name: scrape

on:
  schedule:
    - cron: "0 7-19 * * *" # hourly 09–21 CEST (07–19 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

# Phase 2 collapsed the per-app jobs into one linear pipeline: scrape the
# hub upstream once, then derive each app's scrape-data from EVENTS, then
# commit everything. There's no inter-job rebase contention anymore — the
# whole run produces a single commit.
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run hub scrape
        working-directory: packages/event-hub
        env:
          FETCH_PROXY_URL: ${{ secrets.FETCH_PROXY_URL }}
          FETCH_PROXY_TOKEN: ${{ secrets.FETCH_PROXY_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: bun scripts/scrape.ts

      - name: Derive lehrhaus
        working-directory: apps/lehrhaus
        run: bun scripts/scrape.ts

      - name: Derive konzert-haus
        working-directory: apps/konzert-haus
        run: bun scripts/scrape.ts

      - name: Derive frankfurt-theaters
        working-directory: apps/frankfurt-theaters
        run: bun scripts/scrape.ts

      - name: Derive landau-today
        working-directory: apps/landau-today
        run: bun scripts/scrape.ts

      - name: Derive frankfurt-museums
        working-directory: apps/frankfurt-museums
        env:
          DEEPL_API_KEYS: ${{ secrets.DEEPL_API_KEYS }}
          FETCH_PROXY_URL: ${{ secrets.FETCH_PROXY_URL }}
          FETCH_PROXY_TOKEN: ${{ secrets.FETCH_PROXY_TOKEN }}
        run: bun scripts/scrape.ts

      - name: Derive lichtspiel-haus
        working-directory: apps/lichtspiel-haus
        run: bun scripts/scrape.ts

      - name: Commit if changed
        run: |
          git config user.name "scrape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/event-hub/data/events.ts \
            packages/event-hub/data/venue-names.ts \
            packages/event-hub/data/tmdb-cache.ts \
            apps/lehrhaus/src/scrape-data.ts \
            apps/konzert-haus/src/scrape-data.ts \
            apps/konzert-haus/src/synthesized-venues.ts \
            apps/frankfurt-theaters/src/scrape-data.ts \
            apps/frankfurt-theaters/src/synthesized-theaters.ts \
            apps/landau-today/src/scrape-data.ts \
            apps/landau-today/src/geocode-cache.ts \
            apps/frankfurt-museums/src/scrape-data.ts \
            apps/lichtspiel-haus/src/scrape-data.ts \
            apps/lichtspiel-haus/src/synthesized-cinemas.ts
          if git diff --cached --quiet; then
            echo "no diff, skipping commit"
            exit 0
          fi
          git commit -m "data: scheduled scrape $(date -u +%Y-%m-%dT%H:%MZ)"
          .github/scripts/push-scrape.sh \
            packages/event-hub/data/events.ts \
            packages/event-hub/data/venue-names.ts \
            packages/event-hub/data/tmdb-cache.ts \
            apps/lehrhaus/src/scrape-data.ts \
            apps/konzert-haus/src/scrape-data.ts \
            apps/konzert-haus/src/synthesized-venues.ts \
            apps/frankfurt-theaters/src/scrape-data.ts \
            apps/frankfurt-theaters/src/synthesized-theaters.ts \
            apps/landau-today/src/scrape-data.ts \
            apps/landau-today/src/geocode-cache.ts \
            apps/frankfurt-museums/src/scrape-data.ts \
            apps/lichtspiel-haus/src/scrape-data.ts \
            apps/lichtspiel-haus/src/synthesized-cinemas.ts
