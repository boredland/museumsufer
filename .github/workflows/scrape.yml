name: scrape

on:
  schedule:
    - cron: "0 7-19 * * *" # theaters — hourly 09–21 CEST (07–19 UTC)
    # - cron: "0 6 * * *"   # museums (future) — daily 08 CEST
  workflow_dispatch:
    inputs:
      app:
        description: "Workspace to scrape (theaters | all). Defaults to all."
        required: false
        default: "all"

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  theaters:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7-19 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.app == 'theaters' || inputs.app == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run scraper
        working-directory: apps/frankfurt-theaters
        run: bun scripts/scrape.ts

      - name: Commit if changed
        run: |
          git config user.name "scrape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/frankfurt-theaters/src/scrape-data.ts
          if git diff --cached --quiet; then
            echo "no diff, skipping commit"
            exit 0
          fi
          git commit -m "data(theaters): scheduled scrape $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
