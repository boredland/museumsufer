# Two-service stack: the lightweight fetch-proxy + a FlareSolverr sidecar
# that solves Cloudflare interactive challenges via headless Chromium. The
# proxy forwards normal traffic itself and only invokes FlareSolverr when it
# detects a "Just a moment…" response, so the FS container stays cold most of
# the time.
#
# Deploy on Dokploy: import this file as a Compose service. Set AUTH_TOKEN
# as a stack-level secret. The proxy stays exposed on :3000; FlareSolverr is
# only reachable inside the compose network.

services:
  fetch-proxy:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      flaresolverr:
        condition: service_healthy

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Europe/Berlin
      # Keep the Chromium pool small — we burst-call FS for a handful of
      # detail-page fetches per scrape, not parallel high-volume use.
      BROWSER_LIMIT: "2"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8191/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
