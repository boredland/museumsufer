  <rect width="64" height="64" rx="2" fill="#0E0B07"/>
  <!-- Wiener Werkstätte square-rhythm frieze along the top -->
  <rect x="6"  y="6" width="4" height="4" fill="none" stroke="#C49A47" stroke-width="0.8"/>
  <rect x="14" y="6" width="4" height="4" fill="#C49A47"/>
  <rect x="22" y="6" width="4" height="4" fill="none" stroke="#C49A47" stroke-width="0.8"/>
  <rect x="38" y="6" width="4" height="4" fill="none" stroke="#C49A47" stroke-width="0.8"/>
  <rect x="46" y="6" width="4" height="4" fill="#C49A47"/>
  <rect x="54" y="6" width="4" height="4" fill="none" stroke="#C49A47" stroke-width="0.8"/>
  <!-- Projector iris: three concentric circles -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#C49A47" stroke-width="2"/>
  <circle cx="32" cy="36" r="11" fill="none" stroke="#C49A47" stroke-width="1.5"/>
  <circle cx="32" cy="36" r="4"  fill="#C49A47"/>
